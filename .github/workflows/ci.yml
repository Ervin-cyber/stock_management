name: StockFlow CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ervin-cyber/stock_management

jobs:
  # ==========================================
  # 1. TESTING (CI)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    
    # Postgres
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Setting up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Backend Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          JWT_SECRET: supersecret_test_key
          FRONTEND_URL: http://localhost:5173
        run: |
          npm ci
          npx prisma db push
          npx prisma db seed
          npm run test
          npm run build 

      - name: Frontend Tests
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: |
          npm ci
          # npm run test
          npm run build

  # ==========================================
  # 2. DOCKER IMAGE BUILDING AND PUBLISHING (CD)
  # ==========================================
  build-and-push:
    needs: test # It will ONLY start if the "test" job is successful (green)!
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Setting up QEMU (ARM64 emulator for Raspberry Pi)
        uses: docker/setup-qemu-action@v3

      - name: Configuring Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Building and uploading backend (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest

      - name: Building and uploading a frontend (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          build-args: |
            VITE_API_URL=https://api.papstack.net
            # Vagy írd ide azt a domaint, amin a backend futni fog!